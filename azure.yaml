# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: ai-platform-monitoring
metadata:
  template: custom
location: swedencentral

infra:
  provider: bicep
  path: ./infrastructure
  module: main

services:
  monitor:
    project: ./src
    host: function
    language: python

hooks:
  preprovision:
    shell: pwsh
    run: ./infrastructure/scripts/Pre-Provision.ps1
    interactive: true
    continueOnError: false
  postprovision:
    shell: pwsh
    run: ./infrastructure/scripts/Post-Provision.ps1
    interactive: true
    continueOnError: false
